version: "3.9"
services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:latest
    container_name: hass-dev
    volumes:
      - ./config:/config
      - ./custom_components:/config/custom_components
    ports:
      - "8123:8123"
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    network_mode: host
