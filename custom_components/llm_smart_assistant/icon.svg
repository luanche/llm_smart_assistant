<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>
  <!-- Sparkle/star decoration -->
  <g fill="url(#sparkle)" opacity="0.3">
    <polygon points="24,28 26,34 32,34 27,38 29,44 24,40 19,44 21,38 16,34 22,34" transform="scale(0.6) translate(10,8)"/>
    <polygon points="180,30 182,36 188,36 183,40 185,46 180,42 175,46 177,40 172,36 178,36" transform="scale(0.5) translate(10,8)"/>
  </g>
  <!-- Brain/AI icon -->
  <g fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left brain hemisphere -->
    <path d="M48 42c-8 0-14 6-14 14 0 4 2 8 4 10l-4 8 8-4c2 1 4 2 6 2" fill="rgba(255,255,255,0.15)"/>
    <!-- Right brain hemisphere -->
    <path d="M80 42c8 0 14 6 14 14 0 4-2 8-4 10l4 8-8-4c-2 1-4 2-6 2" fill="rgba(255,255,255,0.15)"/>
    <!-- Center connection -->
    <path d="M54 50c0-6 4-10 10-10s10 4 10 10" />
    <!-- Neural nodes and connections -->
    <circle cx="40" cy="48" r="2.5" fill="#fff"/>
    <circle cx="52" cy="44" r="2" fill="#fff"/>
    <circle cx="64" cy="42" r="2.5" fill="#fff"/>
    <circle cx="76" cy="44" r="2" fill="#fff"/>
    <circle cx="88" cy="48" r="2.5" fill="#fff"/>
    <circle cx="44" cy="60" r="2" fill="#fff"/>
    <circle cx="84" cy="60" r="2" fill="#fff"/>
    <line x1="40" y1="48" x2="52" y2="44" stroke-width="1.5" opacity="0.6"/>
    <line x1="52" y1="44" x2="64" y2="42" stroke-width="1.5" opacity="0.6"/>
    <line x1="64" y1="42" x2="76" y2="44" stroke-width="1.5" opacity="0.6"/>
    <line x1="76" y1="44" x2="88" y2="48" stroke-width="1.5" opacity="0.6"/>
    <line x1="44" y1="60" x2="52" y2="56" stroke-width="1.5" opacity="0.6"/>
    <line x1="84" y1="60" x2="76" y2="56" stroke-width="1.5" opacity="0.6"/>
  </g>
  <!-- Text bubble at bottom -->
  <g fill="none" stroke="#fff" stroke-width="2">
    <rect x="42" y="74" rx="6" ry="6" width="44" height="22" fill="rgba(255,255,255,0.2)"/>
    <polygon points="48,96 54,96 52,100" fill="rgba(255,255,255,0.2)" stroke="none"/>
  </g>
  <!-- Dots in text bubble -->
  <circle cx="58" cy="85" r="2" fill="#fff"/>
  <circle cx="64" cy="85" r="2" fill="#fff"/>
  <circle cx="70" cy="85" r="2" fill="#fff"/>
</svg>
