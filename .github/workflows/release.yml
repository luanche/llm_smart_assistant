name: Release

"on":
  pull_request_target:
    types: [closed]
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Determine bump type
        id: bump
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          echo "Merged branch: $BRANCH"

          case "$BRANCH" in
            feat/*)  echo "type=minor" >> "$GITHUB_OUTPUT" ;;
            fix/*|chore/*|refactor/*|perf/*) echo "type=patch" >> "$GITHUB_OUTPUT" ;;
            *)       echo "type=none" >> "$GITHUB_OUTPUT"  ;;
          esac

      - name: Bump version
        id: version
        if: steps.bump.outputs.type != 'none'
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/llm_smart_assistant/manifest.json'))['version'])")
          echo "Current version: $VERSION"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          if [ "${{ steps.bump.outputs.type }}" = "minor" ]; then
            NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
          else
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          python3 -c "import json; p='custom_components/llm_smart_assistant/manifest.json'; d=json.load(open(p)); d['version']='$NEW_VERSION'; json.dump(d, open(p,'w'), indent=2)"

      - name: Update CHANGELOG.md
        if: steps.bump.outputs.type != 'none'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG=$(git tag --sort=-creatordate | head -1 || echo "")

          HEADER="# Changelog"
          if [ -f CHANGELOG.md ] && [ "$(head -1 CHANGELOG.md)" = "$HEADER" ]; then
            TAIL=$(tail -n +2 CHANGELOG.md)
          fi

          {
            echo "$HEADER"
            echo ""
            echo "## v${VERSION}"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges
            else
              git log --pretty=format:"- %s" --no-merges "$(git rev-list --max-parents=0 HEAD)..HEAD"
            fi
            echo ""
            echo ""
            if [ -n "$TAIL" ]; then
              echo "$TAIL"
            fi
          } > CHANGELOG.md

      - name: Commit and tag
        if: steps.bump.outputs.type != 'none'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add custom_components/llm_smart_assistant/manifest.json CHANGELOG.md
          git commit -m "chore: bump version to v${VERSION}"
          git tag "v${VERSION}"
          git push origin master --tags

      - name: Build archive
        if: steps.bump.outputs.type != 'none'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="llm_smart_assistant_${VERSION}.zip"
          zip -r "${ARCHIVE}" custom_components/llm_smart_assistant/ \
            -x "*/__pycache__/*" "*.pyc" ".DS_Store"
          echo "archive=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Generate release notes
        if: steps.bump.outputs.type != 'none'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG=$(git tag --sort=-creatordate | head -1 || echo "")

          {
            echo "## LLM Smart Assistant v${VERSION}"
            echo ""
            echo "### Changes"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges
            else
              git log --pretty=format:"- %s" --no-merges "$(git rev-list --max-parents=0 HEAD)..HEAD"
            fi
            echo ""
            echo ""
            echo "### Installation"
            echo "Download the zip below and extract into your Home Assistant \`custom_components/\` directory, then restart HA."
            echo ""
            echo "Or install via HACS by adding this repository as a custom integration."
          } > RELEASE_NOTES.md

      - name: Create Release
        if: steps.bump.outputs.type != 'none'
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: ${{ env.archive }}
          fail_on_unmatched_files: true

