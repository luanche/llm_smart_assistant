name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1 || echo "")
          
          echo "# Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## v${VERSION}" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          
          if [ -n "$PREV_TAG" ]; then
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges >> CHANGELOG.md
          else
            git log --pretty=format:"- %s" --no-merges $(git rev-list --max-parents=0 HEAD)..HEAD >> CHANGELOG.md
          fi
          
          echo "" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          cat CHANGELOG.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update changelog for ${GITHUB_REF_NAME}" || echo "No changelog changes"
          git push

      - name: Create release archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="llm_smart_assistant_${VERSION}.zip"
          zip -r "${ARCHIVE}" custom_components/llm_smart_assistant/ \
            -x "*/__pycache__/*" "*.pyc" ".DS_Store"
          echo "archive=${ARCHIVE}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_ENV

      - name: Generate release notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          ## LLM Smart Assistant v${{ env.version }}

          ### Changes
          EOF
          cat CHANGELOG.md | grep "^- " >> RELEASE_NOTES.md
          cat >> RELEASE_NOTES.md << 'EOF'

          ### Installation
          Download the zip below and extract into your Home Assistant \`custom_components/\` directory, then restart HA.

          Or install via HACS by adding this repository as a custom integration.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ env.version }}
          body_path: RELEASE_NOTES.md
          files: ${{ env.archive }}
          fail_on_unmatched_files: true
